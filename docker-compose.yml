services:

  redis:
    image: redis:alpine
    container_name: kitsune-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: kitsune-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build: .
    container_name: kitsune-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - KITSUNE_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: >
      streamlit run app.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true

volumes:
  redis_data:
